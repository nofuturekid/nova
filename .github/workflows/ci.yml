name: CI

# ci.yml runs only on PRs (the gating signal for branch protection) and on
# manual dispatch (for backfill / rebuild of a specific commit). It does
# NOT run on push:main — the squash-merge would otherwise rebuild the
# exact same source the PR-CI just built minutes earlier under a different
# SHA, wasting ~5 minutes per code PR.
#
# release.yml resolves the artifact via the PR# embedded in the merge
# commit's message; see ADR-0014.
#
# Job structure (ADR-0019): `setup` runs first and gates everything else.
# It builds only when a *build-affecting* path changed — an inverted
# allowlist (ADR-0029, supersedes ADR-0009's docs deny-list). `build-debug`
# and `build-release` run in parallel — independent compilations. Each sets
# up its own Gradle cache via `gradle/actions/setup-gradle` (whatever cache
# that action maintains; `cache-read-only` on PRs so untrusted fork PRs
# can't write it — ADR-0018 was Reversed 2026-05-17 and its dedicated
# cache-warm.yml deleted, so nothing actively warms the cache). `build` is a
# tiny aggregator that branch protection requires as the single status check.
on:
  pull_request:
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# CI only checks out + builds + uploads artifacts within the same run —
# read access to repo contents is all it needs.
permissions:
  contents: read

# Unconditional cancel-in-progress is correct here: ADR-0011's
# `${{ github.ref != 'refs/heads/main' }}` carve-out is mooted by ADR-0014
# (ci.yml no longer runs on push:main, so there is never a main-ref run to
# protect). See ADR-0011's 2026-05-17 superseded note for the reconciliation.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need history so docs-only diff works on PRs and pushes

      # Build only when a build-affecting path changed (ADR-0029, an
      # inverted allowlist that supersedes ADR-0009's docs deny-list).
      # The aggregator `build` job reads `setup.outputs.code`, so branch
      # protection's single required check stays SUCCESS without spinning
      # up the parallel compile jobs. Falls back to a full build whenever
      # we can't reliably diff (force-push, new branch, manual dispatch).
      - name: Detect build-affecting change
        id: filter
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch → full build."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # Unreachable: ci.yml triggers are pull_request + workflow_dispatch
            # only (no push:main — ADR-0014). workflow_dispatch is fully
            # handled above. Any other event_name reaching here means the
            # trigger set changed without updating this logic — fail loud
            # (Rule 12) rather than silently diffing against an empty BASE.
            echo "::error::Unexpected event '${{ github.event_name }}' in setup diff — ci.yml triggers changed without updating this step (ADR-0014)."
            exit 1
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "No diff base (force-push / new branch) → full build."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "  ${CHANGED//$'\n'/$'\n'  }"
          # INVERTED allowlist (ADR-0029): enumerate ONLY the small, stable
          # set of build-affecting / shipping paths. Any changed file
          # matching this → full build; everything else (docs, scripts/,
          # docker/, tooling, editor/AI config, …) → skip the APK build.
          #
          # We maintain this short list instead of an ever-growing
          # non-shipping deny-list. Safety net: release.yml fails loudly if
          # a tagged commit has no successful CI build, so a mis-skip can
          # never silently ship (ADR-0004). CONVENTION: introducing a new
          # buildable module/path REQUIRES adding it here in the SAME PR
          # (same discipline ADR-0003 uses for the `build` job name).
          #
          #   ^app/                  app source, res, manifest, app/build.gradle.kts, proguard
          #   ^gradle/               version catalog (libs.versions.toml) + wrapper
          #   ^gradlew, ^gradlew.bat wrapper launchers
          #   ^settings.gradle.kts   module graph
          #   ^build.gradle.kts      root build script
          #   ^gradle.properties     build flags (KSP, caching, jvmargs, …)
          #   ^.github/workflows/ci.yml  ONLY ci.yml among workflows is
          #     build-affecting (ADR-0029 amendment 2026-05-17): a ci.yml
          #     change should be validated by a real build, but actionlint/
          #     codeql/release/dependency-submission changes cannot affect
          #     whether the app compiles — treat them as non-build (docs-like).
          BUILD_AFFECTING=$(echo "$CHANGED" | grep -E '^app/|^gradle/|^gradlew$|^gradlew\.bat$|^settings\.gradle\.kts$|^build\.gradle\.kts$|^gradle\.properties$|^\.github/workflows/ci\.yml$' || true)
          if [ -n "$BUILD_AFFECTING" ]; then
            echo "Build-affecting files changed → full build:"
            echo "  build: ${BUILD_AFFECTING//$'\n'/$'\n'  build: }"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No build-affecting change — skipping APK build (ADR-0029)."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  build-debug:
    needs: setup
    if: needs.setup.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false

      - name: Assemble debug + lint
        run: ./gradlew :app:assembleDebug :app:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
          if-no-files-found: warn

  build-release:
    needs: setup
    if: needs.setup.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false

      - name: Decode release keystore (if available)
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::KEYSTORE_B64 not available (fork PR?); skipping release build"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "$KEYSTORE_B64" | base64 -d > app/release.keystore
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble release
        if: steps.keystore.outputs.available == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verify release APK signature
        if: steps.keystore.outputs.available == 'true'
        run: |
          BT="$ANDROID_HOME/build-tools"
          LATEST=$(find "$BT" -mindepth 1 -maxdepth 1 -printf '%f\n' | sort -V | tail -1)
          APK=$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | sort | head -1)
          "$BT/$LATEST/apksigner" verify --verbose "$APK"

      - name: Upload release APK
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload mapping
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: warn

  # Unit tests (ADR-0036). The repo carries real JVM unit tests
  # (app/src/test/...: UpdateControllerTest, StaleCrossServerTest) plus
  # JUnit + kotlinx-coroutines-test deps, but CI previously only
  # assembled/linted and never executed them — regressions in the test
  # backlog (#18–22) could not be caught. This job runs the Gradle unit
  # tests in parallel with build-debug/build-release (ADR-0019 pattern)
  # and gates the required `build` aggregator below, so a failing test
  # blocks the merge through the EXISTING required check (no
  # branch-protection change — ADR-0027 Tier-2 / ADR-0003). Same skip gate
  # (setup.outputs.code) and setup/cache structure as the build jobs.
  test:
    needs: setup
    if: needs.setup.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 14
          if-no-files-found: warn

  # Aggregator job — branch protection's single required status check.
  # Passes if setup said docs-only (no compile needed) OR both build jobs
  # AND the unit-test job succeeded. Lets us add/remove parallel jobs in
  # the future without having to update branch-protection config.
  build:
    needs: [setup, build-debug, build-release, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        env:
          DOCS_ONLY: ${{ needs.setup.outputs.code != 'true' }}
          SETUP_RESULT: ${{ needs.setup.result }}
          DEBUG_RESULT: ${{ needs.build-debug.result }}
          RELEASE_RESULT: ${{ needs.build-release.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          # `setup` must always have succeeded — it computes the gate output
          # this whole job reads. A failed/cancelled setup is never a pass.
          if [ "$SETUP_RESULT" != "success" ]; then
            echo "::error::setup did not succeed (result=$SETUP_RESULT)."
            exit 1
          fi

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "::notice::No build-affecting change — APK build skipped (ADR-0029). No version bump required."
            exit 0
          fi

          # Build-affecting change → debug MUST succeed (it never needs
          # secrets, so a fork PR debug build is just as valid as ours).
          if [ "$DEBUG_RESULT" != "success" ]; then
            echo "::error::Debug build did not succeed (result=$DEBUG_RESULT)."
            exit 1
          fi

          # Unit tests MUST succeed (ADR-0036). Like build-debug, the test
          # job needs no secrets, so a fork PR run is just as valid as
          # ours — a failing/cancelled test job blocks the required gate.
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::Unit tests did not succeed (result=$TEST_RESULT)."
            exit 1
          fi

          # Fork/no-keystore contract (explicit, not emergent — finding 3):
          # build-release signs + uploads the release APK only when
          # KEYSTORE_B64 is present. On a fork PR the secret is unavailable,
          # the sign/upload steps are skipped, and the job ends `success`
          # with no release artifact — that is the INTENDED state for fork
          # PRs (release.yml backstops the real ship via the merge-commit
          # CI run, ADR-0004/0014). So `skipped` is a legitimate pass here
          # in addition to `success`; only a genuine failure/cancel of
          # build-release blocks the gate. Same-repo PRs (keystore present)
          # always produce `success`, so their behaviour is unchanged.
          if [ "$RELEASE_RESULT" = "success" ] || [ "$RELEASE_RESULT" = "skipped" ]; then
            echo "Gate passed — debug=$DEBUG_RESULT release=$RELEASE_RESULT (skipped = fork/no-keystore, intended)."
            exit 0
          fi
          echo "::error::Release build did not pass — release=$RELEASE_RESULT (expected success, or skipped on a fork PR)."
          exit 1
