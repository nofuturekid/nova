name: CI

# ci.yml runs only on PRs (the gating signal for branch protection) and on
# manual dispatch (for backfill / rebuild of a specific commit). It does
# NOT run on push:main — the squash-merge would otherwise rebuild the
# exact same source the PR-CI just built minutes earlier under a different
# SHA, wasting ~5 minutes per code PR.
#
# release.yml resolves the artifact via the PR# embedded in the merge
# commit's message; see ADR-0014.
#
# Job structure (ADR-0019): `setup` runs first and gates everything else.
# It builds only when a *build-affecting* path changed — an inverted
# allowlist (ADR-0029, supersedes ADR-0009's docs deny-list). `build-debug`
# and `build-release` run in parallel — independent compilations sharing
# the Gradle build cache warmed by cache-warm.yml (ADR-0018). `build` is a
# tiny aggregator that branch protection requires as the single status check.
on:
  pull_request:
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# CI only checks out + builds + uploads artifacts within the same run —
# read access to repo contents is all it needs.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need history so docs-only diff works on PRs and pushes

      # Build only when a build-affecting path changed (ADR-0029, an
      # inverted allowlist that supersedes ADR-0009's docs deny-list).
      # The aggregator `build` job reads `setup.outputs.code`, so branch
      # protection's single required check stays SUCCESS without spinning
      # up the parallel compile jobs. Falls back to a full build whenever
      # we can't reliably diff (force-push, new branch, manual dispatch).
      - name: Detect build-affecting change
        id: filter
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch → full build."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "No diff base (force-push / new branch) → full build."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED" | sed 's/^/  /'
          # INVERTED allowlist (ADR-0029): enumerate ONLY the small, stable
          # set of build-affecting / shipping paths. Any changed file
          # matching this → full build; everything else (docs, scripts/,
          # docker/, tooling, editor/AI config, …) → skip the APK build.
          #
          # We maintain this short list instead of an ever-growing
          # non-shipping deny-list. Safety net: release.yml fails loudly if
          # a tagged commit has no successful CI build, so a mis-skip can
          # never silently ship (ADR-0004). CONVENTION: introducing a new
          # buildable module/path REQUIRES adding it here in the SAME PR
          # (same discipline ADR-0003 uses for the `build` job name).
          #
          #   ^app/                  app source, res, manifest, app/build.gradle.kts, proguard
          #   ^gradle/               version catalog (libs.versions.toml) + wrapper
          #   ^gradlew, ^gradlew.bat wrapper launchers
          #   ^settings.gradle.kts   module graph
          #   ^build.gradle.kts      root build script
          #   ^gradle.properties     build flags (KSP, caching, jvmargs, …)
          #   ^.github/workflows/    the CI/release pipeline shape itself
          BUILD_AFFECTING=$(echo "$CHANGED" | grep -E '^app/|^gradle/|^gradlew$|^gradlew\.bat$|^settings\.gradle\.kts$|^build\.gradle\.kts$|^gradle\.properties$|^\.github/workflows/' || true)
          if [ -n "$BUILD_AFFECTING" ]; then
            echo "Build-affecting files changed → full build:"
            echo "$BUILD_AFFECTING" | sed 's/^/  build: /'
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No build-affecting change — skipping APK build (ADR-0029)."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  build-debug:
    needs: setup
    if: needs.setup.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false

      - name: Assemble debug + lint
        run: ./gradlew :app:assembleDebug :app:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
          if-no-files-found: warn

  build-release:
    needs: setup
    if: needs.setup.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false

      - name: Decode release keystore (if available)
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::KEYSTORE_B64 not available (fork PR?); skipping release build"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "$KEYSTORE_B64" | base64 -d > app/release.keystore
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble release
        if: steps.keystore.outputs.available == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verify release APK signature
        if: steps.keystore.outputs.available == 'true'
        run: |
          BT="$ANDROID_HOME/build-tools"
          LATEST=$(ls "$BT" | sort -V | tail -1)
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          "$BT/$LATEST/apksigner" verify --verbose "$APK"

      - name: Upload release APK
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload mapping
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: warn

  # Aggregator job — branch protection's single required status check.
  # Passes if setup said docs-only (no compile needed) OR both build jobs
  # succeeded. Lets us add/remove parallel jobs in the future without
  # having to update branch-protection config.
  build:
    needs: [setup, build-debug, build-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        env:
          DOCS_ONLY: ${{ needs.setup.outputs.code != 'true' }}
          DEBUG_RESULT: ${{ needs.build-debug.result }}
          RELEASE_RESULT: ${{ needs.build-release.result }}
        run: |
          if [ "$DOCS_ONLY" = "true" ]; then
            echo "::notice::No build-affecting change — APK build skipped (ADR-0029). No version bump required."
            exit 0
          fi
          if [ "$DEBUG_RESULT" = "success" ] && [ "$RELEASE_RESULT" = "success" ]; then
            echo "Both build jobs succeeded."
            exit 0
          fi
          echo "::error::Build failure — debug=$DEBUG_RESULT release=$RELEASE_RESULT"
          exit 1
