name: CodeQL

# This workflow replaces GitHub's CodeQL "default setup" (disabled via the
# code-scanning/default-setup API) with an in-repo "advanced setup" so the
# analysis is disciplined the same way ci.yml is (ADR-0019 spirit).
#
# Default setup ran on every push:main *and* every PR with NO concurrency
# group: rapid squash-merges spun up N parallel main analyses, and even
# docs-only commits got fully scanned. That is pure waste — the PR head is
# the source we care about and it is already analyzed on `pull_request`;
# the post-merge push:main re-run only re-scans the exact same source under
# a new SHA (same rationale ci.yml states for skipping push:main, lines
# ~3-7). So: PR + a weekly baseline only, paths-ignore for non-code, and
# concurrency cancel-in-progress — mirrors ci.yml.
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
  schedule:
    - cron: '27 4 * * 1'   # weekly baseline scan (Mondays 04:27 UTC)
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: CodeQL needs to upload SARIF results
# (security-events) and read the repo + Actions metadata; nothing else.
permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Per-language `build-mode` via matrix include — `build-mode` is a
        # per-language setting, so each entry carries its own.
        #
        # History of this file's two bugs:
        #  1. It originally passed `language:` (singular) to init. That is
        #     NOT a valid codeql-action input (valid key: `languages:`).
        #     init ignored it, autodetected repo languages, and ran
        #     autobuild for java-kotlin regardless of `build-mode: none`.
        #  2. After fixing the key, `build-mode: none` for java-kotlin on
        #     the pinned CodeQL bundle (2.25.4) STILL invoked the Gradle
        #     autobuild and produced an empty Java DB → `database finalize`
        #     aborted with "could not process any code" / exit 32. So
        #     no-build is not viable for this Android project here.
        #
        # Fix: `actions` stays build-mode none (no build needed).
        # java-kotlin uses build-mode manual with an explicit compile that
        # mirrors how this repo builds (ci.yml build-debug / local-ci.sh:
        # JDK 21 temurin, setup-gradle, Android SDK, generateApolloSources
        # then assembleDebug) so CodeQL traces a real compilation.
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (build cache)
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Set up Android SDK
        if: matrix.language == 'java-kotlin'
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # build-mode: manual — CodeQL traces this compilation for java-kotlin.
      # Same tasks as ci.yml build-debug / local-ci.sh (generateApolloSources
      # first so Apollo codegen failures surface crisply, then assembleDebug
      # which compiles all app Kotlin/Java sources).
      - name: Build (manual, for CodeQL trace)
        if: matrix.language == 'java-kotlin'
        run: ./gradlew :app:generateApolloSources :app:assembleDebug --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
