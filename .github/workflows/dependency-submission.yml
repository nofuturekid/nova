name: Gradle dependency submission

# Submits the *resolved* Gradle dependency graph (the full transitive
# set) to GitHub's Dependency submission API after every merge to main,
# so Insights → Dependency graph and Dependabot security alerts see the
# real transitive deps — not just the top-level entries in
# build.gradle.kts / libs.versions.toml.
#
# Why this exists: GITHUB_DEPENDENCY_GRAPH_ENABLED was false, so the
# Gradle dependency graph was invisible to Insights/Dependabot.
#
# This is pure visibility — advisory, non-blocking, no PR noise —
# consistent with ADR-0025's posture: it only writes the dependency
# snapshot for the default branch. It does NOT add dependency-review,
# does NOT gate PRs, and does NOT change the deliberately low-noise
# Dependabot config (still monthly, grouped, no auto-merge).
#
# See ADR-0025.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# The submission API requires `contents: write` to write the dependency
# snapshot for the commit; nothing else is needed.
permissions:
  contents: write

concurrency:
  # Only one submission at a time; if a second push lands while one is
  # running, cancel the older one — only the latest main's graph matters.
  group: dependency-submission
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Submit Gradle dependency graph
        # Resolves every project/configuration and submits the full
        # transitive graph itself — no extra build steps required.
        uses: gradle/actions/dependency-submission@v6
