name: Warm Gradle cache

# Purpose: populate the Gradle build cache (dependencies, plugin classpath,
# Gradle daemon state) after every merge to main, so that subsequent PR CI
# runs — which are configured cache-read-only to protect against fork-PR
# poisoning — start from a warm cache instead of a cold one.
#
# Why this exists: ci.yml runs only on pull_request + workflow_dispatch
# (ADR-0014). With PR builds in cache-read-only mode, no event in the
# repository was actually *writing* to the cache. This workflow fills
# that gap with a cheap dependency-resolution pass — no APK is built,
# no annotation processors run; the goal is purely cache population.
#
# See ADR-0018 for full rationale.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# Only checks out + resolves Gradle deps; nothing is written to the repo.
permissions:
  contents: read

concurrency:
  # Only one warmer at a time; if a second push lands while one is
  # running, cancel the older one — the newer commit is what we want
  # the cache to reflect.
  group: cache-warm
  cancel-in-progress: true

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (cache writes enabled)
        uses: gradle/actions/setup-gradle@v6
        with:
          # The whole point of this workflow.
          cache-read-only: false

      - name: Resolve dependencies
        # Triggers configuration of every project, resolution of every
        # configuration, and download of every artifact. Does not invoke
        # the Android SDK, does not compile Kotlin, does not run KSP.
        run: ./gradlew :app:dependencies --console=plain --quiet || true
