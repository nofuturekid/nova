name: Release

# 'Build once, promote' — release builds REUSE the APK produced by ci.yml
# for the same commit instead of rebuilding from scratch.
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to resolve tag → commit SHA

      - name: Resolve target commit SHA
        id: sha
        run: |
          SHA=$(git rev-parse "${GITHUB_REF#refs/tags/}^{commit}")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Tag ${GITHUB_REF#refs/tags/} points at $SHA"

      - name: Find latest successful CI run for this commit
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$SHA&status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful CI run found for commit $SHA."
            echo "::error::Push to main first, wait for ci.yml to go green, THEN push the tag."
            exit 1
          fi
          echo "Found CI run $RUN_ID"
          echo "id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download release APK from CI run
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/apk
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}

      - name: Download mapping from CI run
        uses: actions/download-artifact@v4
        with:
          name: mapping
          path: artifacts/mapping
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Rename APK to include tag
        id: rename
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          APK=$(ls artifacts/apk/*.apk | head -1)
          OUT="artifacts/apk/UnraidControl-${TAG}.apk"
          mv "$APK" "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if echo "$TAG" | grep -qE -- '-(alpha|beta|rc|pre)'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rename.outputs.apk }}
            artifacts/mapping/mapping.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
