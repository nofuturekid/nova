name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::KEYSTORE_B64 secret is empty — set it in repo Settings → Secrets."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > app/release.keystore
          if [ ! -s app/release.keystore ]; then
            echo "::error::Decoded keystore is empty."
            exit 1
          fi

      - name: Assemble release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verify APK signature
        run: |
          BT="$ANDROID_HOME/build-tools"
          LATEST=$(ls "$BT" | sort -V | tail -1)
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          "$BT/$LATEST/apksigner" verify --verbose "$APK"

      - name: Rename APK to include version
        id: rename
        run: |
          TAG=${GITHUB_REF##*/}
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          OUT="app/build/outputs/apk/release/UnraidControl-${TAG}.apk"
          mv "$APK" "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rename.outputs.apk }}
            app/build/outputs/mapping/release/mapping.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
