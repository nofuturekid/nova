query Ping {
    __typename
}

query FetchContainerLogs($id: PrefixedID!, $tail: Int) {
    docker {
        logs(id: $id, tail: $tail) {
            lines {
                timestamp
                message
            }
            cursor
        }
    }
}

# ── Per-domain queries (replace GetServerSnapshot, see ADR-0017) ──────
#
# Each query is fetched by its own polling Flow in UnraidRepository,
# gated on whether the corresponding tab is currently visible and the
# app is in the foreground. Poll intervals are tuned per domain — see
# UnraidRepository for the actual numbers.

query GetServerInfo {
    info {
        cpu { brand cores threads speedmax }
        memory { layout { size } }
        os { hostname kernel uptime }
        versions { core { unraid kernel } }
    }
}

query GetMetrics {
    metrics {
        cpu { percentTotal }
        memory { total used buffcache }
        temperature {
            summary {
                average
                hottest {
                    name
                    current { value unit }
                }
                warningCount
                criticalCount
            }
        }
    }
}

query GetArray {
    array {
        state
        capacity { kilobytes { total used free } }
        parities  { id name device size status temp type }
        disks     { id name device size status temp fsSize fsFree fsUsed type }
        caches    { id name device size status temp fsSize fsFree fsUsed type }
        parityCheckStatus { progress speed errors running paused }
    }
}

query GetDockerContainers {
    docker {
        containers {
            id names image state status autoStart iconUrl
            isUpdateAvailable isRebuildReady webUiUrl
            ports { privatePort publicPort type }
            mounts networkSettings
        }
    }
}

query GetVms {
    vms {
        domains { id name state }
    }
}

query GetNotifications {
    notifications {
        overview { unread { info warning alert total } }
        warningsAndAlerts {
            id
            title
            subject
            description
            importance
            timestamp
        }
    }
}

# Full two-segment list for the Notifications sheet (incl. INFO). The
# overview is fetched alongside so a single round-trip keeps the bell
# badge consistent with the list after an action-triggered refetch.
fragment NotificationFields on Notification {
    id
    title
    subject
    description
    importance
    link
    type
    timestamp
    formattedTimestamp
}

# `NotificationFilter.type`, `.offset` and `.limit` are all REQUIRED on
# the live Unraid server (verified by read-only introspection 2026-05-17;
# the vendored subset previously declared offset/limit nullable, so this
# operation compiled but failed live with GRAPHQL_VALIDATION_FAILED).
# Inline constants rather than query variables: the only call site
# (UnraidRepository) constructs GetNotificationListQuery() with no args,
# so keeping the generated constructor argument-free avoids a needless
# call-site change. limit 200 is generous so notifications aren't
# silently truncated; offset 0 = first page (no UI pagination today).
query GetNotificationList {
    notifications {
        overview { unread { info warning alert total } }
        unread: list(filter: { type: UNREAD, offset: 0, limit: 200 }) {
            ...NotificationFields
        }
        archived: list(filter: { type: ARCHIVE, offset: 0, limit: 200 }) {
            ...NotificationFields
        }
    }
}

query GetPlugins {
    plugins {
        name
        version
        hasApiModule
        hasCliModule
    }
}

query GetPluginOperations {
    pluginInstallOperations {
        id
        url
        name
        status
        createdAt
        finishedAt
        output
    }
}

query GetInstalledUnraidPlugins {
    installedUnraidPlugins
}

# `primaryNetwork { name }` is intentionally minimal — its full data
# already appears in `networkInterfaces`; we just need the identifier
# so the mapper can mark which interface is the management one.
query GetNetworkInterfaces {
    info {
        networkInterfaces {
            name
            description
            macAddress
            status
            protocol
            ipAddress
            netmask
            gateway
            useDhcp
            ipv6Address
            ipv6Netmask
            ipv6Gateway
            useDhcp6
        }
        primaryNetwork {
            name
        }
        devices {
            network {
                iface
                model
                vendor
                mac
                virtual
                speed
                dhcp
            }
        }
    }
}
