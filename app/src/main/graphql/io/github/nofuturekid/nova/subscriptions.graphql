subscription SystemMetricsNetwork {
  systemMetricsNetwork {
    interfaces {
      iface
      rxBytesPerSec
      txBytesPerSec
    }
  }
}

subscription SystemMetricsCpu {
  systemMetricsCpu {
    percentTotal
  }
}

subscription SystemMetricsMemory {
  systemMetricsMemory {
    total
    used
    buffcache
  }
}

subscription SystemMetricsTemperature {
  systemMetricsTemperature {
    sensors {
      name
      type
      current {
        value
        unit
        status
      }
      warning
      critical
    }
  }
}

subscription DockerContainerStats {
  dockerContainerStats {
    id
    cpuPercent
    memUsage
    memPercent
    netIO
    blockIO
  }
}
