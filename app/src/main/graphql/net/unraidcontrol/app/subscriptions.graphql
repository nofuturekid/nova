# Phase E (ADR-0026) — E1 notifications pilot.
# Single subscription feeding the global bell badge + sheet list in
# real time, replacing the 60 s GetNotifications poll. The repository
# falls back to that poll if the WS session can't be established
# (older API versions / proxy without WS upgrade).
subscription NotificationsFeed {
    notificationsWarningsAndAlerts {
        id
        title
        subject
        description
        importance
        timestamp
    }
}
