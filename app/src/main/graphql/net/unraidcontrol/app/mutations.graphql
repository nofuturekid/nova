mutation StartArray { array { setState(input: { desiredState: START }) { state } } }
mutation StopArray  { array { setState(input: { desiredState: STOP  }) { state } } }

mutation StartContainer(  $id: PrefixedID!) { docker { start(  id: $id) { id state } } }
mutation StopContainer(   $id: PrefixedID!) { docker { stop(   id: $id) { id state } } }
mutation PauseContainer(  $id: PrefixedID!) { docker { pause(  id: $id) { id state } } }
mutation UnpauseContainer($id: PrefixedID!) { docker { unpause(id: $id) { id state } } }

mutation StartVm(    $id: PrefixedID!) { vm { start(    id: $id) } }
mutation StopVm(     $id: PrefixedID!) { vm { stop(     id: $id) } }
mutation PauseVm(    $id: PrefixedID!) { vm { pause(    id: $id) } }
mutation ResumeVm(   $id: PrefixedID!) { vm { resume(   id: $id) } }
mutation ForceStopVm($id: PrefixedID!) { vm { forceStop(id: $id) } }
